    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

    <!-- Navbar seksjon -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Clarify</a>

        </div>
    </nav>

    <!-- Quiz seksjon -->
    <section class="quiz-section">
        <div class="quiz-glow"></div>
        <div class="quiz-container">
            
            <div id="quizContent">
                <div class="quiz-card">
                    <div class="question-counter" id="questionCounter">1/13</div>
                    <h2 class="question" id="question">Loading question...</h2>
                    <div class="options" id="options"></div>
                </div>

                <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%"></div>
            </div>

                <div class="quiz-buttons">
                    <button class="btn btn-secondary" id="prevBtn" style="display: none;">Previous</button>
                    <button class="btn btn-primary" id="nextBtn" disabled>Next Question</button>
                    <button class="btn btn-primary" id="submitBtn" style="display: none;">Submit Quiz</button>
                </div>
            </div>
            
            <div id="quizResult" style="display: none;"></div>
        </div>
    </section>

    <!-- Footer del -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-brand">
                <span class="logo">AIGuidebook</span>

        </div>

        </div>
    </footer>

    <script src="JS/quiz.js"></script>

</body>
</html>

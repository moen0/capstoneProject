<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar seksjon -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Clarify</a>

            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="guidelines.html" class="nav-link">Guidelines</a></li>
                <li class="nav-item"><a href="checklist.html" class="nav-link">Checklist</a></li>
                <li class="nav-item"><a href="quiz.html" class="nav-link">Quiz</a></li>
                <li class="nav-item"><a href="prompt.html" class="nav-link">Prompt-helper</a></li>
                <li class="nav-highlight"></li>
            </ul>

            <a href="login.html" class="nav-cta">Get Started</a>
        </div>
    </nav>
    <!--Login seksjon-->
   <section class="hero">
        <div class="hero-glow"></div>
        <div class="hero-content">
            <h1 class="hero-title">Sign In</h1>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        class="form-input" 
                        placeholder="johndoe"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                    >
                </div>

                <button type="submit" class="form-submit">Sign In</button>

                <div class="form-footer">
                    <a href="#">Forgot password?</a>
                    <div class="form-divider">or</div>
                    <p>Don't have an account? <a href="registration.html">Sign up here</a></p>
                </div>
            </form>
        </div>
    </section>
    
    <script src="JS/main.js"></script>
</body>
</html>
